<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>숲속 토끼의 60초 당근 배터리 레이싱</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: #051605;
            overflow: hidden;
            font-family: 'Malgun Gothic', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: linear-gradient(to bottom, #113811 0%, #051a05 100%);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 1024;
canvas.height = 768;

// 게임 상태 변수
let currentSeconds = 0;
let goldenCarrots = 0; 
let score = 0;
let lives = 5; // 하트 5개로 시작
let isGameOver = false;

let message = "60초를 넘기면 폭발하고 탈것이 다운그레이드됩니다! 필요한 당근만 골라 드세요!";
let messageColor = "#ffffff";
let messageTimer = 240;

// 로컬 스토리지에서 리더보드 데이터 가져오기 (초기값 세팅)
let leaderboard = JSON.parse(localStorage.getItem('carrot_leaderboard')) || [
    { rank: 1, name: "전설의 토끼", score: 1500 },
    { rank: 2, name: "당근 마스터", score: 1000 },
    { rank: 3, name: "빠른 숲볼", score: 600 },
    { rank: 4, name: "산토끼", score: 300 },
    { rank: 5, name: "새내기", score: 100 }
];

// 플레이어 (토끼) 상태
const rabbit = {
    x: canvas.width / 2,
    y: 630,
    size: 50,
    isStunned: false,   
    stunTimer: 0,       
    vehicle: "🐰 맨몸 토끼" 
};

let bullets = [];
let carrots = [];  
let items = [];    
const valuesPool = [30, 20, 10, 5];
let shootTimer = 0;

// 하늘에서 내려오는 타겟 당근 클래스
class FallingCarrot {
    constructor(value, x, y) {
        this.value = value;
        this.x = x;
        this.y = y;
        this.radius = 25 + (value * 1.2); 
        this.speed = 1.2 + Math.random() * 1.5; 
        this.isHit = false;
    }
    update() { this.y += this.speed; }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ff7f50'; 
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff7f50';
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.beginPath();
        ctx.arc(this.x, this.y - this.radius, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#2ed573';
        ctx.fill();

        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.closePath();

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.value + "초", this.x, this.y);
    }
}

// 떨어지는 실물 당근 아이템 클래스
class DropItem {
    constructor(value, x, y) {
        this.value = value;
        this.x = x;
        this.y = y;
        this.speed = 4.5; 
        this.angle = 0;
        this.isEaten = false;
    }
    update() {
        this.y += this.speed;
        this.angle += 0.05; 
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.font = '38px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText("🥕", 0, 0);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 16px Arial';
        ctx.fillText(this.value + "초", 0, 28);
        ctx.restore();
    }
}

// 총알 클래스
class Bullet {
    constructor(x, y, angle = 0) {
        this.x = x;
        this.y = y;
        this.speed = 14;
        this.radius = 6;
        this.angle = angle; 
    }
    update() { 
        this.y -= this.speed; 
        this.x += this.angle * 3; 
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ffff55'; 
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ffff55';
        ctx.fill();
        ctx.closePath();
    }
}

function spawnCarrot() {
    if (isGameOver) return;
    let needed = 60 - currentSeconds;
    let val = valuesPool[Math.floor(Math.random() * valuesPool.length)];
    
    if (needed > 0 && needed < 60 && Math.random() < 0.4) {
        val = needed;
    }

    let x = 80 + Math.random() * (canvas.width - 400); // 랭킹 보드 영역 제외 배치
    carrots.push(new FallingCarrot(val, x, -50));
}

function showMessage(txt, color) {
    message = txt;
    messageColor = color;
    messageTimer = 140;
}

// 랭킹 업데이트 함수
function updateLeaderboard(finalScore) {
    let name = prompt("🎉 게임 오버! 리더보드에 등록할 이름을 입력하세요:", "플레이어");
    if (!name) name = "무명 토끼";
    
    leaderboard.push({ rank: 0, name: name, score: finalScore });
    // 점수 내림차순 정렬
    leaderboard.sort((a, b) => b.score - a.score);
    // 순위 재조정 및 상위 5명 커트
    leaderboard = leaderboard.slice(0, 5);
    leaderboard.forEach((item, index) => {
        item.rank = index + 1;
    });
    
    localStorage.setItem('carrot_leaderboard', JSON.stringify(leaderboard));
}

// 재시작 함수
function resetGame() {
    currentSeconds = 0;
    goldenCarrots = 0;
    score = 0;
    lives = 5;
    isGameOver = false;
    bullets = [];
    carrots = [];
    items = [];
    rabbit.isStunned = false;
    showMessage("새 게임 시작! 필요한 당근을 쏙 골라 드세요!", "#ffffff");
}

function handleMove(e) {
    if (rabbit.isStunned || isGameOver) return;

    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let targetX = (clientX - rect.left) * (canvas.width / rect.width);
    
    if (targetX < 50) targetX = 50;
    if (targetX > canvas.width - 380) targetX = canvas.width - 380; // 리더보드 침범 방지
    
    rabbit.x = targetX;
}

// 마우스/터치 클릭 시 재시작 핸들러
function handleClick(e) {
    if (isGameOver) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let clickX = (clientX - rect.left) * (canvas.width / rect.width);
        let clickY = (clientY - rect.top) * (canvas.height / rect.height);

        // 다시하기 버튼 크기 범위 체크
        if (clickX > 250 && clickX < 450 && clickY > 420 && clickY < 480) {
            resetGame();
        }
    }
}

canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('touchmove', handleMove, { passive: false });
canvas.addEventListener('mousedown', handleClick);
canvas.addEventListener('touchstart', handleClick);

function updateAndDraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 우측 실시간 랭킹 시스템 보드 영역 (배경과 분리)
    ctx.fillStyle = '#142514';
    ctx.fillRect(700, 0, 324, canvas.height);
    ctx.strokeStyle = '#2ed573';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(700, 0);
    ctx.lineTo(700, canvas.height);
    ctx.stroke();

    // 🏆 랭킹 텍스트 렌더링
    ctx.fillStyle = '#ffdf00';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText("🏆 실시간 명예의 전당", 862, 60);

    ctx.fillStyle = '#ffffff';
    ctx.font = '14px Arial';
    ctx.fillText("최고 조종사에 도전하세요!", 862, 95);

    // 랭킹 목록 출력
    leaderboard.forEach((user, i) => {
        let boxY = 140 + (i * 65);
        ctx.fillStyle = '#1c371c';
        ctx.fillRect(720, boxY, 284, 50);
        ctx.strokeStyle = '#2ed573';
        ctx.strokeRect(720, boxY, 284, 50);

        // 등수별 메달 색상 변경
        if (i === 0) ctx.fillStyle = '#ffdf00';
        else if (i === 1) ctx.fillStyle = '#d1d2d6';
        else if (i === 2) ctx.fillStyle = '#b07c57';
        else ctx.fillStyle = '#ffffff';

        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`${user.rank}등  ${user.name}`, 740, boxY + 30);
        
        ctx.textAlign = 'right';
        ctx.fillText(`${user.score} 점`, 980, boxY + 30);
    });

    if (!isGameOver) {
        // [기절 타이머 관리]
        if (rabbit.isStunned) {
            rabbit.stunTimer--;
            if (rabbit.stunTimer <= 0) {
                rabbit.isStunned = false;
            }
        }

        // [탈것 자동 사격 패턴 및 등급 결정]
        shootTimer++;
        if (!rabbit.isStunned && shootTimer % 14 === 0) {
            if (goldenCarrots === 0) {
                bullets.push(new Bullet(rabbit.x, rabbit.y - 30, 0));
                rabbit.vehicle = "🐰 맨몸 토끼";
            } else if (goldenCarrots === 1) {
                bullets.push(new Bullet(rabbit.x - 15, rabbit.y - 30, 0));
                bullets.push(new Bullet(rabbit.x + 15, rabbit.y - 30, 0));
                rabbit.vehicle = "🛹 숲속 나무 보드";
            } else if (goldenCarrots === 2) {
                bullets.push(new Bullet(rabbit.x, rabbit.y - 30, 0));
                bullets.push(new Bullet(rabbit.x - 15, rabbit.y - 30, -0.8));
                bullets.push(new Bullet(rabbit.x + 15, rabbit.y - 30, 0.8));
                rabbit.vehicle = "🛩️ 당근 제트기";
            } else {
                bullets.push(new Bullet(rabbit.x - 20, rabbit.y - 30, -0.5));
                bullets.push(new Bullet(rabbit.x - 5, rabbit.y - 35, 0));
                bullets.push(new Bullet(rabbit.x + 5, rabbit.y - 35, 0));
                bullets.push(new Bullet(rabbit.x + 20, rabbit.y - 30, 0.5));
                rabbit.vehicle = "🤖 전설의 메카 토끼 로봇";
            }
        }

        if (Math.random() < 0.022 && carrots.length < 5) {
            spawnCarrot();
        }

        // 총알 업데이트
        for (let b of bullets) { b.update(); b.draw(); }
        bullets = bullets.filter(b => b.y > 0);

        // 하늘 당근 업데이트 및 격추 검사
        for (let c of carrots) {
            c.update();
            c.draw();

            for (let b of bullets) {
                let dist = Math.hypot(c.x - b.x, c.y - b.y);
                if (dist < c.radius + b.radius) {
                    items.push(new DropItem(c.value, c.x, c.y));
                    c.isHit = true;
                    bullets = bullets.filter(bullet => bullet !== b);
                    score += 10;
                    break;
                }
            }
        }
        carrots = carrots.filter(c => c.y < canvas.height && !c.isHit);

        // 떨어지는 아이템 획득 및 페널티 연산
        for (let item of items) {
            item.update();
            item.draw();

            let distToRabbit = Math.hypot(item.x - rabbit.x, item.y - rabbit.y);
            if (distToRabbit < rabbit.size + 15 && !rabbit.isStunned) {
                
                if (currentSeconds + item.value < 60) {
                    currentSeconds += item.value;
                    showMessage(`냠냠! +${item.value}초 당근 채워짐!`, '#ffa502');
                } else if (currentSeconds + item.value === 60) {
                    currentSeconds = 0;
                    goldenCarrots += 1;
                    score += 150; // 성공 점수 대폭 상향
                    showMessage("🎉 대성공! 60초 달성으로 탈것 진화!", '#2ed573');
                } else {
                    // 💥 [수정 및 추가된 복합 페널티 로직]
                    currentSeconds = 0;       // 1. 0초 리셋
                    rabbit.isStunned = true;   // 2. 2초 기절
                    rabbit.stunTimer = 120;  
                    lives -= 1;                // 3. 하트 1개 감소
                    
                    // 4. 탈것 단계 다운그레이드
                    if (goldenCarrots > 0) {
                        goldenCarrots -= 1;
                        showMessage("💥 60초 초과! 바구니 리셋 + 기절 + 탈것 다운그레이드! 💔", '#ff4757');
                    } else {
                        showMessage("💥 60초 초과! 바구니 리셋 + 기절! 💔 하트가 깎였습니다.", '#ff4757');
                    }

                    // 하트가 0개가 되면 게임 오버 처리 활성화
                    if (lives <= 0) {
                        isGameOver = true;
                        updateLeaderboard(score);
                    }
                }
                item.isEaten = true;
            }
        }
        items = items.filter(item => item.y < canvas.height && !item.isEaten);
    }

    // 플레이어 토끼 그리기
    if (!isGameOver) {
        ctx.save();
        if (rabbit.isStunned && Math.floor(shootTimer / 4) % 2 === 0) {
            ctx.globalAlpha = 0.3; 
        }
        ctx.font = '65px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        if (goldenCarrots === 0) ctx.fillText("🐰", rabbit.x, rabbit.y);
        else if (goldenCarrots === 1) ctx.fillText("🛹🐰", rabbit.x, rabbit.y);
        else if (goldenCarrots === 2) ctx.fillText("🛩️🐰", rabbit.x, rabbit.y);
        else ctx.fillText("🤖🐰", rabbit.x, rabbit.y);
        
        ctx.restore();
    }

    // 하단 게이지 UI
    const bView = { x: 225, y: 700, w: 250, h: 40 };
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3;
    ctx.strokeRect(bView.x, bView.y, bView.w, bView.h);
    
    if (currentSeconds > 0 && !isGameOver) {
        let fillW = (currentSeconds / 60) * bView.w;
        ctx.fillStyle = rabbit.isStunned ? '#ff4757' : '#ff7f50';
        ctx.fillRect(bView.x + 2, bView.y + 2, fillW - 4, bView.h - 4);
    }
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`🥕 당근 게이지: ${currentSeconds} / 60 초`, bView.x + (bView.w/2), bView.y + 25);

    // 💖 상단 목숨(하트) UI 렌더링
    let heartStr = "";
    for(let h=0; h<5; h++) {
        heartStr += (h < lives) ? "❤️" : "🖤";
    }
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`목숨: ${heartStr}`, 40, 50);

    // 상단 스코어 보드 UI
    ctx.fillText(`🧺 황금 바구니: ${goldenCarrots} 개`, 40, 90);
    ctx.fillText(`🌟 실시간 점수: ${score} 점`, 40, 125);
    
    ctx.fillStyle = '#ffdf00';
    ctx.font = 'bold 18px Arial';
    ctx.fillText(`🎖️ 현재 탈것: [${rabbit.vehicle}]`, 40, 160);

    // 실시간 시스템 공지 메시지
    if (messageTimer > 0 && !isGameOver) {
        ctx.fillStyle = messageColor;
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(message, 350, 230);
        if(!rabbit.isStunned) messageTimer--;
    }

    // 🟥 게임오버 연출 오버레이
    if (isGameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(0, 0, 700, canvas.height);

        ctx.fillStyle = '#ff4757';
        ctx.font = 'bold 55px Arial';
        ctx.textAlign = 'center';
        ctx.fillText("GAME OVER", 350, 300);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 24px Arial';
        ctx.fillText(`최종 기록 🌟 ${score} 점`, 350, 360);

        // 다시하기 버튼 UI
        ctx.fillStyle = '#2ed573';
        ctx.fillRect(250, 420, 200, 60);
        ctx.strokeStyle = '#ffffff';
        ctx.strokeRect(250, 420, 200, 60);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 20px Arial';
        ctx.fillText("다시 하기 🔄", 350, 455);
    }

    requestAnimationFrame(updateAndDraw);
}

updateAndDraw();
</script>

</body>
</html>
